[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "relic-cli"
version = "0.8.0"
description = "Spec-driven development with a shared artifact layer"
readme = "README.md"
requires-python = ">=3.8"
license = "MIT"
keywords = ["spec-driven", "ai", "llm", "cli"]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Topic :: Software Development :: Build Tools",
]

[project.scripts]
relic = "relic.__main__:main"

[project.urls]
Homepage = "https://github.com/filipefpaulo/relic"
Repository = "https://github.com/filipefpaulo/relic"

[tool.hatch.build.targets.wheel]
packages = ["relic"]
artifacts = ["relic/relic", "relic/relic.exe"]
