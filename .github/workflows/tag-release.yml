name: Tag release

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  tag:
    name: Create release tag on version bump
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version bump and push tag
        run: |
          prev=$(git show HEAD~1:packages/cli-node/package.json 2>/dev/null \
            | grep '"version"' \
            | sed 's/.*"version": *"\([^"]*\)".*/\1/' || echo "")
          curr=$(grep '"version"' packages/cli-node/package.json \
            | sed 's/.*"version": *"\([^"]*\)".*/\1/')

          if [ -z "$curr" ]; then
            echo "Could not read current version — skipping."
            exit 0
          fi

          if [ "$prev" = "$curr" ]; then
            echo "No version bump detected (both at $curr) — skipping."
            exit 0
          fi

          tag="v${curr}"
          echo "Version bumped: $prev → $curr. Creating tag $tag."

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"
          echo "Tag $tag pushed — publish workflows will trigger."
