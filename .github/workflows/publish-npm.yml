name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

jobs:
  publish:
    if: "!endsWith(github.ref_name, '-pypi')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify npm token is configured
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Error: NPM_TOKEN secret is not configured in this repository."
            echo "Create an automation token at npmjs.com and add it as NPM_TOKEN in repo secrets."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Build npm bundle
        run: bun run build:npm

      - name: Publish to npm
        working-directory: packages/cli-node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
