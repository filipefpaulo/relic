name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  validate:
    if: "!endsWith(github.ref_name, '-pypi')"
    name: Changelog gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check CHANGELOG entry
        run: |
          version="${GITHUB_REF_NAME#v}"
          if grep -qE "^## \[$version\]" CHANGELOG.md; then
            echo "CHANGELOG.md has ## [$version] entry — proceeding."
          else
            echo "Error: CHANGELOG.md is missing a ## [$version] entry."
            echo "Add a changelog section before pushing a release tag."
            exit 1
          fi

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Build npm bundle
        run: bun run build:npm

      - name: Publish to npm
        working-directory: packages/cli-node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
